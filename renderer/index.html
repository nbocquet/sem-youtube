<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>sem-youtube</title>
		<style>
			* {
				box-sizing: border-box;
			}
			html, body {
				height: 100%;
				margin: 0;
			}
			body {
				display: flex;
				align-items: center;
				justify-content: center;
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
				background: #001d1d;
				color: #fff;
			}
			main {
				width: 100%;
				max-width: 520px;
				padding: 32px;
				text-align: center;
			}
			h1 {
				margin: 0 0 8px;
				font-size: 28px;
				color: #00ced1;
			}
			p.sous-titre {
				margin: 0 0 32px;
				color: #b7d9d9;
				font-size: 14px;
			}
			form {
				display: flex;
				gap: 8px;
			}
			input[type="url"] {
				flex: 1;
				padding: 12px 14px;
				border-radius: 8px;
				border: 1px solid #00595a;
				background: #002828;
				color: #fff;
				font-size: 15px;
			}
			input[type="url"]:focus {
				outline: 2px solid #00ced1;
			}
			button {
				padding: 12px 20px;
				border-radius: 8px;
				border: none;
				background: #00ced1;
				color: #001d1d;
				font-weight: 600;
				font-size: 15px;
				cursor: pointer;
			}
			button:hover {
				background: #00e5e8;
			}
			p.erreur {
				margin-top: 12px;
				color: #ff8a8a;
				font-size: 14px;
				min-height: 20px;
			}
			p.astuce {
				margin-top: 24px;
				color: #6fa0a0;
				font-size: 12px;
			}
		</style>
	</head>
	<body>
		<main>
			<h1>sem-youtube</h1>
			<p class="sous-titre">Collez un lien YouTube pour le regarder sans distraction, sans compte, sans backend.</p>
			<form id="formulaire">
				<input id="lien" type="url" placeholder="https://www.youtube.com/watch?v=..." autofocus>
				<button type="submit">Regarder</button>
			</form>
			<p class="erreur" id="erreur"></p>
			<p class="astuce">Astuce&nbsp;: <kbd>Ctrl/Cmd+N</kbd> pour revenir ici depuis le lecteur.</p>
		</main>
		<script src="./home.js"></script>
	</body>
</html>
