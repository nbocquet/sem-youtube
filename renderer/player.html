		<div id="retour" role="button" tabindex="0" title="Regarder une autre vidéo" aria-label="Regarder une autre vidéo" onclick="window.location.href = './index.html'">
			<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" width="24px" height="24px" fill="#ffffff" aria-hidden="true"><path d="M400-80 0-480l400-400 71 71-329 329 329 329-71 71Z"/></svg>
		</div>

		<script>
			const parametres = new URLSearchParams(window.location.search)
			const videoId = parametres.get('videoId') || ''
			let debut = parseInt(parametres.get('debut'), 10) || 0
			let fin = parseInt(parametres.get('fin'), 10) || 600
			let sousTitres = parametres.get('st') || ''
			let vignette = parametres.get('vignette') || ''
			let largeur = parseInt(parametres.get('largeur'), 10) || 16
			let hauteur = parseInt(parametres.get('hauteur'), 10) || 9
			let ratio = 'large'
			if ((largeur / hauteur) === (4 / 3)) {
				ratio = 'tv'
			} else if ((largeur / hauteur) === 1) {
				ratio = 'carre'
			} else if (largeur < hauteur) {
				ratio = 'vertical'
			}

			if (!videoId) {
				window.location.href = './index.html'
			}

			if (vignette) {
				document.querySelector('#masque').style.backgroundImage = 'url(' + JSON.stringify(vignette).slice(1, -1) + ')'
			}

			function integrer () {
				document.querySelector('#lecteur').src = `https://www.youtube-nocookie.com/embed/` + encodeURIComponent(videoId) + `?iv_load_policy=3&cc_load_policy=1&playsinline=1&rel=0&controls=0&showinfo=0&start=` + debut + `&end=` + fin + `&enablejsapi=1`
				const script = document.createElement('script')
				script.src = './player.js'
				document.body.appendChild(script)
			}

			integrer()
		</script>
